name: Cargo Documentation GitHub Pages Deploy Action

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Install Nightly Rust
        run: rustup install nightly

      - name: Generate Cargo Documentation
        run: RUSTDOCFLAGS='--cfg docsrs' cargo +nightly doc --no-deps --workspace --all-features
        shell: bash

      - name: Redirect to Documentation Crate from index.html
        run: echo '<!DOCTYPE html><html><head><meta http-equiv="Refresh" content="0; URL=_docs/index.html" /></head></html>' > target/doc/index.html
        shell: bash

      - name: Create .nojekyll (ensures pages with underscores work on gh pages)
        run: touch target/doc/.nojekyll
        shell: bash

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: target/doc
