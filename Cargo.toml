[package]
name = "metw-accounts-center"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros"] }
async-trait = "0.1"

sqlx = { version = "0.8", features = ["postgres", "chrono"]}

dotenvy = "0.15"
lazy_static = "1.5"

validator = { version = "0.20", features = ["derive"] }
regex = "1.12"
serde = { version = "1", features = ["derive"] }
