[package]
name = "metw-accounts-center"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros", "sync"] }
async-trait = "0.1"

sqlx = { version = "0.8", features = ["postgres", "chrono"]}
chrono = "0.4"

jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
argon2 = "0.5"

pastey = "0.2"
dotenvy = "0.15"
lazy_static = "1.5"
thiserror = "2"

validator = { version = "0.20", features = ["derive"] }
regex = "1.12"
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
serial_test = "3.4"
